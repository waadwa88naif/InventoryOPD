<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تحديث توفر الأدوية</title>

  <style>
    :root {
      --blue: #075ed1;
      --blue-dark: #0b1b3f;
      --blue-soft: #eef5ff;
      --border: #e5e7eb;
      --gray: #6b7280;
      --bg: #f8fafc;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Tahoma, Arial, sans-serif;
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      color: var(--blue-dark);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 460px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 28px 22px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
      text-align: center;
    }

    .label {
      display: inline-block;
      background: var(--blue-soft);
      color: var(--blue);
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.3;
      font-weight: 800;
      letter-spacing: -0.4px;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--gray);
      font-size: 15px;
      direction: ltr;
    }

    .desc {
      margin: 20px auto 28px;
      max-width: 360px;
      color: #4b5563;
      line-height: 1.8;
      font-size: 15px;
    }

    .btn {
      display: block;
      width: 100%;
      text-decoration: none;
      border-radius: 18px;
      padding: 18px 16px;
      margin-top: 14px;
      font-size: 21px;
      font-weight: 800;
      transition: 0.18s ease;
    }

    .btn small {
      display: block;
      margin-top: 4px;
      font-size: 13px;
      font-weight: 500;
      direction: ltr;
      opacity: 0.85;
    }

    .btn-primary {
      background: var(--blue);
      color: white;
      box-shadow: 0 14px 28px rgba(7, 94, 209, 0.22);
    }

    .btn-secondary {
      background: var(--blue-soft);
      color: var(--blue);
      border: 1px solid #cfe0ff;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .note {
      margin-top: 22px;
      color: var(--gray);
      font-size: 12px;
      line-height: 1.7;
    }
  </style>
</head>

<body>
  <main class="container">
    <div class="label">الصيدلية الخارجية</div>

    <h1>تحديث توفر الأدوية</h1>
    <div class="subtitle">Medication Availability Tool</div>

    <p class="desc">
      صفحة دخول سريعة للوصول إلى لوحة تحديث التموين ولوحة عرض الصيادلة.
    </p>

    <a
      class="btn btn-primary"
      href="https://script.google.com/macros/s/AKfycbxekKr8lQKqJtWp8rTvz3L0mP1Y5c8tZyJDWuSwO0mBLPqldp5_UKyGAOOXesE-MVAp/exec?page=supply"
    >
      لوحة التموين
      <small>Supply Update Panel</small>
    </a>

    <a
      class="btn btn-secondary"
      href="https://script.google.com/macros/s/AKfycbxekKr8lQKqJtWp8rTvz3L0mP1Y5c8tZyJDWuSwO0mBLPqldp5_UKyGAOOXesE-MVAp/exec?page=pharmacist"
    >
      لوحة الصيادلة
      <small>Pharmacist Dashboard</small>
    </a>

    <div class="note">
      تعتمد حالة التوفر على آخر تحديث من قسم التموين.
    </div>
  </main>
</body>
</html>
